# SwimBlocks org-wide repo defaults — single source of truth.
#
# Applied by `scripts/apply-settings.py` (called from
# `.github/workflows/reconcile-repo-defaults.yml` on a schedule and on demand,
# and from `scripts/create-repo.sh` when a new repo is created).
#
# Format follows the Probot "Settings" app YAML shape, so this file is
# drop-in compatible if we ever adopt a hosted reconciler. Keys we don't
# act on yet are documented so they can be turned on later without changing
# the source of truth.

repository:
  # Merge methods: squash-only.
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: false

  # Use the PR title and body verbatim as the squash commit subject + body.
  # (The PR body is required to be substantive — see CONTRIBUTING.md.)
  squash_merge_commit_title: PR_TITLE
  squash_merge_commit_message: PR_BODY

  # Quality-of-life defaults that pair naturally with the squash-only flow.
  delete_branch_on_merge: true
  allow_update_branch: true

# Branch protection applied to the default branch of every repo. Maps to
# PUT /repos/{owner}/{repo}/branches/{name}/protection.
#
# `enforce_admins: false` is deliberate: with a single admin/code-owner you
# would otherwise deadlock on your own PRs. Admins can bypass; the rules
# apply to everyone else (and to agents).
#
# `require_code_owner_reviews: true` is a no-op on repos that don't have a
# CODEOWNERS file — harmless. It enforces real review on swimblocks/.github.
branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
        require_code_owner_reviews: true
        dismiss_stale_reviews: true
      required_status_checks: null
      enforce_admins: false
      restrictions: null
      required_linear_history: true
      allow_force_pushes: false
      allow_deletions: false
      required_conversation_resolution: true
