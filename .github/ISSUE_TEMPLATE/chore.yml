name: Chore / DevOps
description: Maintenance, tooling, CI, docs, dependency, or refactor work
labels: ["chore"]
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: What needs doing and why?
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      description: How will we know it's complete?
    validations:
      required: false
